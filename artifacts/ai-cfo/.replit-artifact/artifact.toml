kind = "web"
previewPath = "/"
title = "AI CFO"
version = "1.0.0"
id = "artifacts/ai-cfo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22558

[services.development]
run = "pnpm --filter @workspace/ai-cfo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-cfo", "run", "build" ]
publicDir = "artifacts/ai-cfo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22558"
BASE_PATH = "/"
