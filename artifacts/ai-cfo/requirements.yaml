packages:
  "framer-motion": "For page transitions, smooth entries, and list staggering"
  "recharts": "For the dashboard financial charts (MRR/Revenue)"
  "lucide-react": "For beautiful, consistent iconography across the dashboard"
  "@hookform/resolvers": "For Zod form validation"
  "react-hook-form": "For robust form state management"
  "zod": "For client-side form validation schemas"
  "date-fns": "For formatting dates in the insights and dashboard"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility to merge tailwind classes safely"
  "@radix-ui/react-slot": "For Radix UI slot composition"

images:
  - path: "artifacts/ai-cfo/public/images/auth-bg.png"
    description: "Abstract, deep dark blue and indigo geometric 3d shapes with glassmorphism effects, cinematic lighting, corporate professional financial aesthetic"
    aspect_ratio: "9:16"
  - path: "artifacts/ai-cfo/public/images/logo.png"
    description: "Minimalist modern geometric logo mark in vibrant indigo and cyan on a transparent background"
    aspect_ratio: "1:1"

notes:
  - Frontend uses @workspace/api-client-react for TanStack Query hooks.
  - Auth token saved to localStorage as 'ai_cfo_token'.
  - Assumes backend is running and accessible at /api.
